  :root{
    --bg-deep: #0a0e27;
    --bg-card: #12163a;
    --silver: #e9e6de;
    --shadow-dark: #060819;
    --gold: #c9a86a;
    --violet: #8f85c9;
    --text-dim: #8b8fb0;
    --line: rgba(233,230,222,0.12);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background: radial-gradient(ellipse at 50% -10%, #171c46 0%, var(--bg-deep) 55%, #060819 100%);
    color: var(--silver);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 40px;
  }
  .stars{
    position: fixed; inset:0; z-index:0; pointer-events:none;
  }
  .stars span{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    opacity:.5; animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15} 50%{opacity:.8} }

  .wrap{
    position:relative; z-index:1; max-width:460px; margin:0 auto; padding: 28px 20px 10px;
    /* Platz für iPhone-Statusleiste (Notch, Batterie, Netz) im Standalone-Modus */
    padding-top: calc(28px + env(safe-area-inset-top, 0px));
  }

  .lang-switch{
    position:absolute; top:14px; right:16px; display:flex; gap:4px; z-index:2;
    top: calc(14px + env(safe-area-inset-top, 0px));
  }
  .lang-switch button{
    background:none; border:1px solid transparent; color:var(--text-dim);
    font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:1px;
    padding:4px 8px; border-radius:12px; cursor:pointer;
  }
  .lang-switch button.active{ color:var(--gold); border-color:var(--line); }

  .eyebrow{
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); text-align:center; margin-bottom: 6px; font-weight:500;
  }
  h1{
    font-family:'Cormorant Garamond', serif; font-weight:500; font-style:italic;
    font-size: 34px; text-align:center; margin: 0 0 4px; color: var(--silver);
    letter-spacing: .5px;
  }
  .subtitle{ text-align:center; color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }

  /* Dial */
  .dial-stage{
    position:relative; width: 300px; height: 300px; margin: 18px auto 6px;
    touch-action: none;
  }
  .ticks{
    position:absolute; inset:0; transform-origin: 50% 50%;
    transition: none;
  }
  .tick{
    position:absolute; left:50%; top:50%; width:2px; height:10px;
    background: var(--text-dim); opacity:.35; border-radius:1px;
    transform-origin: 50% 150px;
  }
  .tick.today{ background: var(--gold); opacity: 1; width:3px; height:14px; }
  .pointer{
    position:absolute; top:-2px; left:50%; transform: translateX(-50%);
    width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent;
    border-top:9px solid var(--gold); z-index:5;
  }
  .dial-ring{
    position:absolute; inset:14px; border-radius:50%;
    border: 1px solid var(--line);
  }
  .moon-holder{
    position:absolute; inset: 42px; border-radius:50%;
    filter: drop-shadow(0 0 26px rgba(201,168,106,0.18));
  }
  /* Foto als normales <img> (robuster als SVG-<image> mit Data-URI),
     Schatten-SVG liegt passgenau darüber */
  .moon-photo{
    position:absolute; left:5.5%; top:5.5%; width:89%; height:89%;
    border-radius:50%; display:block;
  }
  svg.moon{ position:absolute; inset:0; width: 100%; height: 100%; }

  .drag-hint{
    text-align:center; font-size:11px; color: var(--text-dim); margin: 2px 0 20px;
    letter-spacing:.5px;
  }

  .date-row{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom: 4px;
  }
  .date-label{
    font-family:'Cormorant Garamond', serif; font-size: 22px; font-style:italic; font-weight:500;
  }
  .offset-pill{
    font-size: 11px; background: rgba(143,133,201,0.18); color: var(--violet);
    padding: 3px 10px; border-radius: 20px; letter-spacing:.3px;
  }
  .btn-row{
    display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
    margin: 8px auto 22px;
  }
  .today-btn{
    background:none; border: 1px solid var(--line);
    color: var(--gold); font-size: 12px; padding: 7px 14px; border-radius: 20px;
    letter-spacing: 1px; text-transform: uppercase; cursor:pointer;
    font-family:'Work Sans',sans-serif;
  }
  .today-btn:active{ background: rgba(201,168,106,0.1); }

  .phase-card{
    background: linear-gradient(155deg, var(--bg-card), rgba(18,22,58,0.4));
    border: 1px solid var(--line);
    border-radius: 18px; padding: 22px 22px 20px; margin-bottom: 16px;
  }
  .phase-title-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .phase-name{ font-family:'Cormorant Garamond',serif; font-size:26px; font-style:italic; font-weight:500; color: var(--gold); }
  .illum{ font-size:12px; color: var(--text-dim); }
  .phase-mood{ font-size: 14px; line-height:1.55; color: var(--silver); opacity:.92; margin-bottom:14px; }

  .tips-head{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    margin-bottom:8px; flex-wrap:wrap;
  }
  .tips-label{
    font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--violet);
  }
  .tips-mode{ display:flex; gap:4px; }
  .tips-mode button{
    background:none; border:1px solid transparent; color:var(--text-dim);
    font-family:'Work Sans',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; border-radius:12px; cursor:pointer;
  }
  .tips-mode button.active{ color:var(--gold); border-color:var(--line); }
  .tips{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px; }
  .tips li{
    font-size: 13.5px; line-height:1.5; padding-left: 16px; position:relative; color: var(--silver); opacity:.9;
  }
  .tips li::before{
    content:''; position:absolute; left:0; top:7px; width:5px; height:5px; border-radius:50%;
    background: var(--gold);
  }

  .footnote{
    text-align:center; font-size: 10.5px; color: var(--text-dim); opacity:.7;
    line-height:1.5; padding: 6px 10px 0;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="lang-switch">
    <button id="langDe" data-lang="de">DE</button>
    <button id="langPt" data-lang="pt">PT</button>
    <button id="langEs" data-lang="es">ES</button>
  </div>
  <div class="eyebrow">Luna</div>
  <h1 id="appTitle">Dein Mond heute</h1>
  <div class="subtitle" id="appSubtitle">Drehe den Ring, um durch die Mondtage zu reisen</div>

  <div class="dial-stage" id="dialStage">
    <div class="pointer"></div>
    <div class="dial-ring"></div>
    <div class="ticks" id="ticks"></div>

// ---------- Mondphasen-Mathematik ----------
const SYNODIC = 29.530588853;
const KNOWN_NEW_MOON = Date.UTC(2000,0,6,18,14,0);

function phaseForDate(date){
  const diffDays = (date.getTime() - KNOWN_NEW_MOON) / 86400000;
  let phase = (diffDays % SYNODIC) / SYNODIC;
  if(phase < 0) phase += 1;
  return phase; // 0..1, 0=Neumond, 0.5=Vollmond
}

function phaseKey(phase){
  if(phase < 0.025 || phase > 0.975) return 'newMoon';
  if(phase < 0.22) return 'waxCrescent';
  if(phase < 0.28) return 'firstQuarter';
  if(phase < 0.47) return 'waxGibbous';
  if(phase < 0.53) return 'fullMoon';
  if(phase < 0.72) return 'wanGibbous';
  if(phase < 0.78) return 'lastQuarter';
  return 'wanCrescent';
}

function illumination(phase){
  return Math.round(((1 - Math.cos(2*Math.PI*phase))/2) * 100);
}

// ---------- Mond-Rendering ----------
// Schattenform mit korrektem Terminator: eine Halb-Ellipse mit rx = R*|cos(2*PI*phase)|.
// Der Pfad ragt 3px über den Mondrand hinaus (RS), damit die Blur-Kante außerhalb
// des Clips liegt und nur der Terminator weich wird.
const shadowPath = document.getElementById('shadowPath');
const R = 88, CX = 100, CY = 100, RS = R + 3;

function renderMoon(phase){
  const top = CY - RS, bottom = CY + RS;
  let d;
  if(phase < 0.002 || phase > 0.998){
    // Neumond: komplette Scheibe verschatten
    d = `M ${CX} ${top} A ${RS} ${RS} 0 1 0 ${CX} ${bottom} A ${RS} ${RS} 0 1 0 ${CX} ${top} Z`;
  } else if(Math.abs(phase - 0.5) < 0.002){
    // Vollmond: kein Schatten
    d = '';
  } else {
    const c = Math.cos(2*Math.PI*phase);
    const waxing = phase < 0.5;
    const bulge = waxing ? c : -c;            // Wölbungsrichtung des Terminators (+ = rechts)
    const rx = Math.max(0.5, Math.abs(c) * R);
    const limbSweep = waxing ? 0 : 1;         // Schatten liegt links (zunehmend) bzw. rechts (abnehmend)
    const termSweep = bulge > 0 ? 0 : 1;
    d = `M ${CX} ${top} A ${RS} ${RS} 0 0 ${limbSweep} ${CX} ${bottom}` +
        ` A ${rx} ${RS} 0 0 ${termSweep} ${CX} ${top} Z`;
  }
  shadowPath.setAttribute('d', d);
}

// ---------- UI Update ----------
const dateLabel = document.getElementById('dateLabel');
const offsetPill = document.getElementById('offsetPill');
const phaseNameEl = document.getElementById('phaseName');
const illumTextEl = document.getElementById('illumText');
const phaseMoodEl = document.getElementById('phaseMood');
const tipsList = document.getElementById('tipsList');

let currentOffset = null;

function updateForOffset(offsetDays){
  if(offsetDays === currentOffset) return; // nur neu rendern, wenn sich der Tag ändert
  currentOffset = offsetDays;

  const L = I18N[lang];
  const today = new Date();
  today.setHours(12,0,0,0); // Mittag, um Zeitzonen-Kanten zu vermeiden
  const target = new Date(today.getTime() + offsetDays*86400000);

  const phase = phaseForDate(target);
  renderMoon(phase);
  const info = L.phases[phaseKey(phase)];

  phaseNameEl.textContent = info.name;
  illumTextEl.textContent = illumination(phase) + L.illumSuffix;
  phaseMoodEl.textContent = info.mood;
  // Jahreszeit aus dem angezeigten Datum; PT = Brasilien = Südhalbkugel (Jahreszeiten um 2 verschoben)
  let season = Math.floor(((target.getMonth() - 2 + 12) % 12) / 3); // 0=Frühling … 3=Winter (Nordhalbkugel)
  if(lang === 'pt') season = (season + 2) % 4;
  document.getElementById('tipsLabel').textContent = tipsMode === 'garden'
    ? L.tipsLabelGarden + ' · ' + L.seasons[season]
    : L.tipsLabel;
  const tips = tipsMode === 'garden' ? info.garden[season] : info.tips;
  tipsList.innerHTML = '';
  tips.forEach(t=>{
    const li = document.createElement('li');
    li.textContent = t;
    tipsList.appendChild(li);
  });

  const yearSuffix = target.getFullYear() !== today.getFullYear() ? ' ' + target.getFullYear() : '';
  if(offsetDays === 0){
    dateLabel.textContent = L.fmtToday(target.getDate(), L.months[target.getMonth()]);
    offsetPill.style.display = 'none';
  } else {
    dateLabel.textContent = L.fmtDate(L.weekdays[target.getDay()], target.getDate(), L.months[target.getMonth()], yearSuffix);
    offsetPill.style.display = 'inline-block';
    offsetPill.textContent = (offsetDays > 0 ? '+' : '') + offsetDays + (Math.abs(offsetDays) === 1 ? L.day : L.days);
  }
}

// ---------- Sprachumschaltung ----------
function applyLang(l){
  lang = l;
  try{ localStorage.setItem('luna-lang', l); }catch(e){}
  document.documentElement.lang = l;
  const L = I18N[l];
  document.getElementById('appTitle').textContent = L.title;
  document.getElementById('appSubtitle').textContent = L.subtitle;
  document.getElementById('dragHint').textContent = L.hint;
  document.getElementById('newMoonBtn').textContent = L.newMoonBtn;
  document.getElementById('todayBtn').textContent = L.todayBtn;
  document.getElementById('fullMoonBtn').textContent = L.fullMoonBtn;
  document.getElementById('modePersonal').textContent = L.modePersonal;
  document.getElementById('modeGarden').textContent = L.modeGarden;
  document.getElementById('footDisclaimer').textContent = L.footnote;
  document.getElementById('footCredit').textContent = L.credit;
  document.getElementById('langDe').classList.toggle('active', l === 'de');
  document.getElementById('langPt').classList.toggle('active', l === 'pt');
  document.getElementById('langEs').classList.toggle('active', l === 'es');
  // Karte in neuer Sprache neu rendern
  const off = currentOffset === null ? 0 : currentOffset;
  currentOffset = null;
  updateForOffset(off);
}

document.getElementById('langDe').addEventListener('click', ()=> applyLang('de'));
document.getElementById('langPt').addEventListener('click', ()=> applyLang('pt'));
document.getElementById('langEs').addEventListener('click', ()=> applyLang('es'));

// ---------- Empfehlungs-Modus (Persönlich / Garten) ----------
function setTipsMode(m){
  tipsMode = m;
  try{ localStorage.setItem('luna-tips', m); }catch(e){}
  document.getElementById('modePersonal').classList.toggle('active', m === 'personal');
  document.getElementById('modeGarden').classList.toggle('active', m === 'garden');
  // Karte im neuen Modus neu rendern
  const off = currentOffset === null ? 0 : currentOffset;
  currentOffset = null;
  updateForOffset(off);
}

document.getElementById('modePersonal').addEventListener('click', ()=> setTipsMode('personal'));
document.getElementById('modeGarden').addEventListener('click', ()=> setTipsMode('garden'));

// ---------- Ticks ----------
const ticksEl = document.getElementById('ticks');
const DEG_PER_DAY = 12; // 30 Ticks à 12° = voller Kreis
const TOTAL_TICKS = 30;
for(let i=0;i<TOTAL_TICKS;i++){
  const t = document.createElement('div');
  t.className = 'tick' + (i===0 ? ' today' : '');
  t.style.transform = 'translate(-50%,-100%) rotate(' + (i*DEG_PER_DAY) + 'deg)';
  ticksEl.appendChild(t);
}

// ---------- Drag / Rotation ----------
const stage = document.getElementById('dialStage');
let rotation = 0;
let dragging = false;
let lastAngle = 0;

function angleFromEvent(e){
  const rect = stage.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const point = e.touches ? e.touches[0] : e;
  const dx = point.clientX - cx;
  const dy = point.clientY - cy;
  return Math.atan2(dy,dx) * 180/Math.PI;
}

function onDown(e){
  dragging = true;
  lastAngle = angleFromEvent(e);
  ticksEl.style.transition = 'none';
}
function onMove(e){
  if(!dragging) return;
  e.preventDefault();
  const a = angleFromEvent(e);
  // Delta inkrementell aufsummieren und auf -180..180 normalisieren,
  // sonst springt das Datum beim Überqueren der atan2-Kante um ±30 Tage
  let delta = a - lastAngle;
  if(delta > 180) delta -= 360;
  if(delta < -180) delta += 360;
  lastAngle = a;
  rotation += delta;
  ticksEl.style.transform = 'rotate(' + rotation + 'deg)';
  updateForOffset(Math.round(rotation / DEG_PER_DAY));
}
function onUp(){
  if(!dragging) return;
  dragging = false;
  // auf den nächsten Tag einrasten
  rotation = Math.round(rotation / DEG_PER_DAY) * DEG_PER_DAY;
  ticksEl.style.transition = 'transform .25s ease-out';
  ticksEl.style.transform = 'rotate(' + rotation + 'deg)';
}

stage.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
stage.addEventListener('touchstart', onDown, {passive:true});
window.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp);
window.addEventListener('touchcancel', onUp);

// ---------- Sprung-Buttons ----------
function goToOffset(off){
  rotation = off * DEG_PER_DAY;
  ticksEl.style.transition = 'transform .5s ease-in-out';
  ticksEl.style.transform = 'rotate(' + rotation + 'deg)';
  updateForOffset(off);
}

// Nächster Voll-/Neumond ab dem aktuell gewählten Tag (targetPhase: 0.5 = Vollmond, 0 = Neumond)
function nextPhaseOffset(targetPhase){
  const base = new Date(); base.setHours(12,0,0,0);
  const start = new Date(base.getTime() + currentOffset*86400000);
  const p = phaseForDate(start);
  let daysAhead = ((((targetPhase - p) % 1) + 1) % 1) * SYNODIC;
  if(daysAhead < 0.5) daysAhead += SYNODIC; // Ereignis ist bereits der gewählte Tag -> nächster Zyklus
  return currentOffset + Math.round(daysAhead);
}

document.getElementById('todayBtn').addEventListener('click', ()=> goToOffset(0));
document.getElementById('fullMoonBtn').addEventListener('click', ()=> goToOffset(nextPhaseOffset(0.5)));
document.getElementById('newMoonBtn').addEventListener('click', ()=> goToOffset(nextPhaseOffset(0)));

// ---------- Init ----------
// Bei jedem Update zusammen mit der Cache-Version in sw.js hochzählen
const APP_VERSION = 'v6';
document.getElementById('appVersion').textContent = 'Luna ' + APP_VERSION;
setTipsMode(tipsMode);
applyLang(lang);
</script>
